name: Build ZMK Firmware for SliceMK Ergodox Wireless Lite

on:
    workflow_dispatch:
        inputs:
            dummy:
                description: 'Trigger build'
                required: false

jobs:
  convert-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install West
        run: pip3 install west

      - name: Run QMK to ZMK conversion
        run: |
          python3 qmk_to_zmk.py

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('zmk_firmware/config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l zmk_firmware/config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Install Zephyr SDK and dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel xz-utils file \
            make gcc gcc-multilib g++-multilib libsdl2-dev
          pip3 install --user -r zephyr/scripts/requirements.txt

      - name: Build ZMK firmware
        run: |
          west build -s zmk/app -d build/slicemk_ergodox_wireless_lite -- -DSHIELD=slicemk_ergodox_wireless_lite -DZMK_CONFIG="${{ github.workspace }}/zmk_firmware/config"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: slicemk-ergodox-wireless-lite-firmware
          path: build/slicemk_ergodox_wireless_lite/zephyr/zmk.uf2
